# @package _global_

# Experiment: Train GPT-2 with DPO on Anthropic HH-RLHF dataset
# Real preference data for production-quality DPO training
# Usage: python scripts/train/train_dpo.py experiment=dpo_gpt2_hh_rlhf

defaults:
  - override /model: gpt2
  - override /technique: dpo
  - override /data: preference

# Model configuration
model:
  name: "gpt2"
  use_lora: true  # Recommended for DPO
  use_4bit: false
  use_8bit: false
  lora_config:
    r: 8
    lora_alpha: 16
    target_modules: ["c_attn"]
    lora_dropout: 0.05
    bias: "none"

# DPO specific
technique:
  beta: 0.1  # KL penalty coefficient (tune: 0.1-0.5)
  loss_type: "dpo"  # or "ipo" for more robustness
  logging:
    log_rewards: true
    num_rewards_to_log: 5

# Data configuration - Anthropic HH-RLHF
data:
  use_synthetic: false
  dataset_name: "Anthropic/hh-rlhf"
  dataset_config: null
  train_split: "train"
  eval_split: "test"
  num_train_examples: 10000  # Subset of full dataset
  num_eval_examples: 1000
  format: "anthropic"  # Parse Anthropic conversation format
  cache_dir: null

# Training configuration (DPO-optimized for real data)
training:
  output_dir: "./outputs/dpo_gpt2_hh_rlhf"
  num_epochs: 1  # Usually 1 epoch is enough
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8  # Effective batch = 16
  learning_rate: 5e-7  # Conservative for real data
  weight_decay: 0.0
  warmup_steps: 100
  max_grad_norm: 1.0
  logging_steps: 50
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3  # Keep more checkpoints for real data
  fp16: false  # Set true for GPU training
  bf16: false

# Evaluation
evaluation:
  do_eval: true

# Logging
logging:
  use_wandb: false  # Set true for experiment tracking
  use_tensorboard: true
  wandb_project: "llm-post-training"
  wandb_run_name: "dpo_gpt2_hh_rlhf"

# Tokenizer
tokenizer:
  max_length: 512

# Checkpoint
checkpoint:
  resume_from_checkpoint: null
  load_best_model_at_end: true
  metric_for_best_model: "eval_accuracy"
  greater_is_better: true

# Seed
seed: 42

# Device
device: "auto"

# Number of workers
num_workers: 4
