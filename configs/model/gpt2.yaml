# GPT-2 Model Configuration
# Small model (124M params) - great for learning and quick experimentation

# Model settings (merged into cfg.model by Hydra)
name: "gpt2"
type: "language"
architecture: "gpt2"

# LoRA configuration
use_lora: true
lora_config:
  r: 8
  lora_alpha: 16
  target_modules: ["c_attn", "c_proj"]
  lora_dropout: 0.05
  bias: "none"

# Quantization (set to true if using limited GPU memory)
use_4bit: false
use_8bit: false

# Generation settings
generation:
  max_new_tokens: 100
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  do_sample: true
