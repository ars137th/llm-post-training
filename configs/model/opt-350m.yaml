# OPT-350M Model Configuration
# Small OPT model - good balance of capability and efficiency

model:
  name: "facebook/opt-350m"
  type: "language"
  architecture: "opt"

  # LoRA configuration
  use_lora: true
  lora_config:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "k_proj", "v_proj", "out_proj"]
    lora_dropout: 0.05
    bias: "none"

  # Quantization
  use_4bit: false
  use_8bit: false

  # Generation settings
  generation:
    max_new_tokens: 128
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    do_sample: true

# Tokenizer settings
tokenizer:
  max_length: 512
  padding: "max_length"
  truncation: true
