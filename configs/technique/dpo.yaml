# Direct Preference Optimization (DPO) Configuration
# Settings are merged into cfg.technique by Hydra

name: "dpo"
type: "preference_learning"

# DPO-specific parameters
beta: 0.1  # Temperature parameter controlling KL divergence (typical: 0.1-0.5)
           # Higher beta = stay closer to reference model (more conservative)
           # Lower beta = more aggressive optimization (risk overfitting)

loss_type: "dpo"  # "dpo" or "ipo"
                  # dpo: Standard DPO with log-sigmoid loss
                  # ipo: Identity Preference Optimization with squared loss (more robust)

# Training hyperparameters (DPO-specific recommendations)
learning_rate: 5e-7  # Much lower than SFT or reward modeling
                     # DPO is sensitive to learning rate
num_epochs: 1  # Typically 1 epoch is sufficient
               # More epochs can cause overfitting to preferences
batch_size: 2  # Smaller batch due to processing pairs (chosen + rejected)
gradient_accumulation_steps: 8  # Effective batch size = 16 (larger is better)

# Optimization
optimizer: "adamw"
weight_decay: 0.0  # Often no weight decay for DPO
lr_scheduler: "linear"
warmup_ratio: 0.1  # Small warmup

# Regularization
max_grad_norm: 1.0  # Gradient clipping
dropout: 0.0

# Data processing
max_length: 512  # Max sequence length for both chosen and rejected

# Logging specific to DPO
logging:
  log_rewards: true  # Log implicit reward values during training
  num_rewards_to_log: 5  # Number of reward samples to log
  log_kl_divergence: true  # Log KL divergence from reference
  log_reward_margins: true  # Log reward margins

# Evaluation metrics
evaluation:
  metrics:
    - "accuracy"  # Primary metric: % of pairs where implicit R(chosen) > R(rejected)
    - "reward_margin"  # Average separation between chosen and rejected rewards
    - "kl_divergence"  # KL divergence from reference model

# Expected performance thresholds
expected_performance:
  min_accuracy: 0.55  # Should be better than random (0.5)
  good_accuracy: 0.65  # Decent DPO performance
  excellent_accuracy: 0.70  # Very good (matches or exceeds PPO)

# DPO vs PPO comparison notes:
# - DPO is simpler (no separate reward model or RL)
# - DPO is more stable (no RL divergence issues)
# - DPO uses lower learning rate (5e-7 vs 1e-5)
# - DPO needs fewer epochs (1 vs 2-3)
# - DPO performance typically matches or exceeds PPO
