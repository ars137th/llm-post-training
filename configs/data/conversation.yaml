# Conversation Dataset Configuration
# For supervised fine-tuning on conversational data
# Settings are merged into cfg.data by Hydra

name: "conversation"
type: "text"

# Dataset source
# Using wikitext as it's simple and doesn't require scripts
dataset_name: "wikitext"  # HuggingFace dataset name
dataset_config: "wikitext-2-raw-v1"  # Smaller version for quick testing
data_files: null
data_dir: null

# Splits
train_split: "train"
eval_split: "validation"
test_split: "test"

# Sampling
max_train_samples: 100  # Small sample for quick testing
max_eval_samples: 20   # Small eval set
shuffle_train: true

# Format
format_type: "auto"  # Auto-detect format
prompt_column: "dialog"
response_column: "dialog"  # For conversation, may extract from same column

# Preprocessing
preprocessing:
  lowercase: false
  remove_special_chars: false
  max_length: 512
  min_length: 10

# Caching
cache_dir: null
use_cached: true
