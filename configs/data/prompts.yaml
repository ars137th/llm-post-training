# Prompts Data Configuration for PPO/RLHF

name: "prompts"

# Data source
use_synthetic: false  # Use synthetic prompts for testing
prompt_file: "./datasets/prompts.txt"  # Path to prompts file (one per line)

# Number of prompts
num_prompts: 1000  # Total prompts to use (null = use all)

# Tokenization
max_prompt_length: 512  # Max tokens in prompt
max_response_length: 256  # Max tokens in generated response

# Synthetic data settings (when use_synthetic=true)
synthetic:
  num_prompts: 100
  seed: 42

# Format
format: "plain"  # "plain", "chatm l", "alpaca"

# Notes:
# - For PPO, we only need prompts (not full preference pairs like DPO)
# - Responses will be generated by the policy during rollout
# - Reward model will score (prompt, response) pairs
